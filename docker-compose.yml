services:
  postgres:
    image: postgres:17
    container_name: pollen-postgres-local
    environment:
      POSTGRES_DB: pollen
      POSTGRES_USER: pollen_user
      POSTGRES_PASSWORD: local_dev_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pollen_user -d pollen"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
